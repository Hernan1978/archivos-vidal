<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - ARCHIVOS VIDAL</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="eye-favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gate-wrap {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: linear-gradient(180deg, #fffdf8 0%, #f4efe6 100%);
        }
        .gate-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 18px 40px rgba(0,0,0,.08);
            border: 1px solid rgba(139,69,19,.12);
        }
        .gate-card h1 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 8px;
            font-size: 2rem;
            color: #2f261f;
        }
        .gate-card p {
            color: #6a5b50;
            margin-bottom: 20px;
        }
        .gate-input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #c9b6a6;
            font-size: 1rem;
            outline: none;
            margin-bottom: 16px;
        }
        .gate-btn {
            width: 100%;
            padding: 14px 16px;
            border: 0;
            border-radius: 12px;
            background: #8b4513;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }
        .gate-error {
            color: #b42318;
            margin-top: 12px;
            display: none;
        }
        .admin-panel {
            display: none;
        }
    </style>
</head>
<body>
    <div class="gate-wrap" id="gateWrap">
        <div class="gate-card">
            <h1>Acceso admin</h1>
            <p>Ingresá la clave para entrar al panel.</p>
            <input type="password" id="adminPass" class="gate-input" placeholder="Clave">
            <button class="gate-btn" id="enterBtn">Entrar</button>
            <div class="gate-error" id="gateError">Clave incorrecta.</div>
        </div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <header class="main-header light-header">
            <div class="header-content">
                <div class="title-section">
                    <h1 class="main-title" style="font-size: 3rem;">ADMIN</h1>
                    <p class="subtitle">Panel administrativo</p>
                    <a href="index.html" class="hero-btn primary" style="display:inline-flex;margin-top:18px;">
                        <i class="fas fa-home"></i> Inicio
                    </a>
                </div>
            </div>
        </header>

        <div class="admin-container">
            <div class="admin-card">
                <h2><i class="fas fa-plus-circle"></i> Crear nuevo artículo</h2>
                <form id="articleForm">
                    <div class="form-group">
                        <label for="title">Título</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Categoría</label>
                        <select id="category" required>
                            <option value="">Selecciona una categoría</option>
                            <option value="historia">Historia</option>
                            <option value="musica">Música</option>
                            <option value="baile">Baile</option>
                            <option value="bandas">Bandas</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="preview">Descripción breve</label>
                        <textarea id="preview" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="date">Fecha</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label for="image">URL de imagen</label>
                        <input type="url" id="image" required>
                    </div>
                    <div class="form-group">
                        <label for="link">Link al artículo completo</label>
                        <input type="url" id="link" required>
                    </div>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-paper-plane"></i> Publicar artículo
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const PASS = '1234';
        const gateWrap = document.getElementById('gateWrap');
        const adminPanel = document.getElementById('adminPanel');
        const adminPass = document.getElementById('adminPass');
        const gateError = document.getElementById('gateError');

        function openAdmin() {
            gateWrap.style.display = 'none';
            adminPanel.style.display = 'block';
            sessionStorage.setItem('adminAuth', '1');
        }

        if (sessionStorage.getItem('adminAuth') === '1') openAdmin();

        document.getElementById('enterBtn').addEventListener('click', () => {
            if (adminPass.value === PASS) {
                openAdmin();
            } else {
                gateError.style.display = 'block';
            }
        });

        adminPass.addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('enterBtn').click();
        });

        document.getElementById('articleForm')?.addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Listo, luego conectamos este formulario con Sheets.');
        });
    </script>
</body>
</html>
